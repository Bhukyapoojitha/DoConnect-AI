spring.application.name=DoConnect_Final

# SERVER
server.port=8080

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/doconnect_db_final
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
jwt.secret=ZG9jb25uZWN0X3N1cGVyX3NlY3JldF9rZXlfMjAyNF9zZWN1cmU=
jwt.expiration=86400000

# GEMINI AI
gemini.api.key=your_gemini_api_key_here
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
ai.provider=gemini

# OPENAI
openai.api.key=your_openai_api_key_here
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-3.5-turbo

# WEBSOCKET
spring.websocket.allowed-origins=http://localhost:3000

# SWAGGER
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# CORS
app.cors.allowed-origins=http://localhost:3000

# FILE UPLOAD
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# LOGGING
logging.file.name=logs/doconnect.log
logging.level.root=INFO
logging.level.com.doconnect=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n